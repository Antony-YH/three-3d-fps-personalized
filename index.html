<!DOCTYPE html>
<html lang="es">
<head>
    <title>Three.js - Tactical Engine HUD</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link type="text/css" rel="stylesheet" href="./assets/css/main.css">

    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon" />
</head>
<body>

    <div class="fx-overlay"></div>

    <div class="crosshair"></div>

    <nav class="navbar navbar-expand-lg fixed-top custom-ui hud-panel border-bottom-hud">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold hud-title d-flex align-items-center" href="#">
                <i class="bi bi-hexagon-fill me-2 pulse-icon text-cyan"></i> 
                <span class="text-white ms-2">Física e interacción 3D</span>
            </a>
            
            <div class="d-none d-xl-flex flex-wrap gap-2 hud-controls">
                <div class="hud-badge theme-cyan">
                    <i class="bi bi-mouse-fill me-1 icon-glow"></i> MOUSE <span class="hud-subtext">| MIRA Y LANZA</span>
                </div>
                <div class="hud-badge theme-orange">
                    <i class="bi bi-dpad-fill me-1 icon-glow"></i> WASD <span class="hud-subtext">| MOVER</span>
                </div>
                <div class="hud-badge theme-green">
                    <i class="bi bi-chevron-double-up me-1 icon-glow"></i> SPACE <span class="hud-subtext">| SALTAR / VOLAR</span>
                </div>
                
                <div class="hud-badge theme-cyan ms-3">
                    <i class="bi bi-person-bounding-box me-1 icon-glow"></i> R <span class="hud-subtext">| 1RA / 3RA</span>
                </div>
                <div class="hud-badge theme-orange">
                    <i class="bi bi-camera-video-fill me-1 icon-glow"></i> T <span class="hud-subtext">| CÁM. LIBRE</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="container"></div>

    <footer class="fixed-bottom custom-ui hud-panel border-top-hud py-2">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <div class="system-status">
                <span class="status-dot"></span> SYSTEMA ONLINE
            </div>
            <div class="developer-info text-end">
                <span class="hud-label">PROGRAMADOR:</span> 
                <span class="text-white fw-bold tracking-wide">Antonio Yáñez Hernández</span> 
                <span class="hud-subtext d-none d-sm-inline">| ISC TECNM</span>
            </div>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "three": "./assets/build/three.module.js",
                "three/addons/": "./assets/jsm/"
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="./assets/js/main.js"></script>

</body>
</html>
